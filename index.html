<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BTCTürk AI Scanner</title>

<link rel="manifest" href="/manifest.json">

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    margin:0;
    padding:15px;
}

h2{
    text-align:center;
}

.card{

    background:#222;
    padding:15px;
    margin:10px 0;
    border-radius:12px;

}


.green{
    color:#00ff88;
    font-weight:bold;
}


.yellow{
    color:#ffd000;
    font-weight:bold;
}


.time{

    text-align:center;
    color:#aaa;

}

</style>

</head>


<body>


<h2>🚀 BTCTürk AI Scanner</h2>

<div class="time" id="saat">
Tarama bekleniyor...
</div>


<div id="liste">

Veriler yükleniyor...

</div>



<script>


// Bildirim sistemi

if ("serviceWorker" in navigator){

    navigator.serviceWorker.register(
        "/service-worker.js"
    );

}


if ("Notification" in window){

    Notification.requestPermission();

}



// Coin tarama

async function tara(){


try{


let cevap = await fetch("/firsatlar");


let veri = await cevap.json();



let alan = document.getElementById("liste");


alan.innerHTML="";


document.getElementById("saat").innerHTML =
"Son tarama: " + veri.saat;



if(veri.coinler.length==0){

alan.innerHTML =
"Şu an güçlü fırsat yok";

return;

}



veri.coinler.forEach(c=>{


let renk =
c.ai >=80 ? "green" : "yellow";



alan.innerHTML += `

<div class="card">

<h3>${c.coin}</h3>

Fiyat:
${c.fiyat} TL

<br>

24s:
%${c.degisim}

<br>

Hacim:
${c.hacim}

<br><br>

<span class="${renk}">
${c.sinyal}
</span>

<br>

AI Skor:
${c.ai}

</div>

`;



});


}

catch(e){

document.getElementById("liste").innerHTML =
"Bağlantı hatası";

}


}



tara();


// 30 saniyede bir yenile

setInterval(
    tara,
    30000
);


</script>



</body>
</html>
